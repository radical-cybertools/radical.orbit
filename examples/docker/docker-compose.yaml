x-common-build: &common-build
  image: ${RADICAL_ORBIT_IMAGE:-radicalcybertools/radical.orbit}:${RADICAL_ORBIT_TAG:-latest}
  build:
    context: .
    dockerfile: Dockerfile
    args:
      RADICAL_ORBIT_BRANCH: ${RADICAL_ORBIT_BRANCH:-master}

services:
  bridge:
    <<: *common-build
    build:
      args:
        GENERATE_BRIDGE_CERT: "true"
        BRIDGE_IP: "127.0.0.1"
        BRIDGE_HOSTNAME: ${RADICAL_BRIDGE_HOSTNAME:-bridge}
    container_name: radical-bridge
    hostname: ${RADICAL_BRIDGE_HOSTNAME:-bridge}
    command: [ "orbit-bridge.py" ]
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python3 -c 'import socket; s=socket.socket(); s.settimeout(5); s.connect(("localhost", 8000)); s.close()'
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 30s
    ports:
      - "8000:8000"
    volumes:
      - orbit-volume:/app
    networks:
      - orbit-network

  endpoint:
    <<: *common-build
    build:
      args:
        GENERATE_BRIDGE_CERT: "false"
    container_name: orbit
    hostname: endpoint
    environment:
      - RADICAL_BRIDGE_URL=https://${RADICAL_BRIDGE_HOSTNAME:-bridge}:8000
    command: [ "orbit-endpoint.py" ]
    volumes:
      - orbit-volume:/app:ro
    networks:
      - orbit-network
    depends_on:
      bridge:
        condition: service_healthy

  client:
    <<: *common-build
    build:
      args:
        GENERATE_BRIDGE_CERT: "false"
    container_name: orbit-client
    hostname: client
    environment:
      - RADICAL_BRIDGE_URL=https://${RADICAL_BRIDGE_HOSTNAME:-bridge}:8000
    command: [ "tail", "-f", "/dev/null" ]
    volumes:
      - orbit-volume:/app:ro
    networks:
      - orbit-network
    depends_on:
      bridge:
        condition: service_healthy
      endpoint:
        condition: service_started

volumes:
  orbit-volume:
    name: orbit-volume

networks:
  orbit-network:
    name: orbit-network
